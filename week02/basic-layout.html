<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic HTML Structure</title>
    <meta name="description" content="A basic HTML structure example using semantic HTML elements">
    <meta name="author" content="Anna Bubyr">
</head>
<body>
    <header>
        <img src="images/basic-logo.png" alt="Computer monitor displaying HTML code" width="128" height="128">
    </header>
    <nav>
        <ul>
            <li><a href="https://www.churchofjesuschrist.org/?lang=eng">The Church</a></li> 
            <li><a href="https://www.byui.edu/">BYU-Idaho</a></li>
        </ul>
    </nav>
    <main>
        <h1>Basic HTML Structure</h1>
        <section>
            <h2>Heading</h2>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Cupiditate, debitis.</p>
        </section>
        <section>
            <h2>Heading</h2>
            <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Delectus, sit.</p>
        </section>
    </main>
    <aside>
        <img src="https://www.churchofjesuschrist.org/temples/photo-gallery?lang=spa" alt="Aba Nigeria Temple" width="200">
    </aside>
    <footer>
        <p>Anna Bubyr</p>
    </footer>
    
</body>
</html>
