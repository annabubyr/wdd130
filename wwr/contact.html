<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Rapids Whitewater rafting</title>
    <meta name="description"
      content="Contact Rapids Whitewater Rafting for questions about our trips, services, or booking. Use our contact form or reach out directly.">
    <meta name="author" content="Anna Bubyr">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header class="container">
        <img src="images/logo.jpeg" alt="Rafting site logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>
    <main class="contact-page">
        <h1 class="contact">Rapids White Water Company</h1>
        <p>123 Main River Street</p>
        <p>Kolob, California</p>
        <p>+1 999 999 9999</p>
        <p>info@whitewater.com</p>
        <section class="questions">
            <div class="map">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d52962.50917102522!2d-116.70632790636456!3d33.937094414682235!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x80db3d64182daf11%3A0x2d76993b99ba0a91!2sWhitewater%2C%20CA%2092282%2C%20USA!5e0!3m2!1sen!2sca!4v1775945692618!5m2!1sen!2sca"
                  allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
            <form>
                <div class="form-item">
                    <label for="fullname">Name:</label>
                    <input type="text" id="fullname" name="fullname" required>
                </div>
                <div class="form-item">
                    <label for="useremail">Email:</label>
                    <input type="email" id="useremail" name="useremail" required>
                </div>


                <div class="form-item">
                    <p>Message Purpose:</p>

                    <input type="radio" id="general" name="purpose" value="general" required>
                    <label for="general">General Inquiry</label><br>

                    <input type="radio" id="reservation" name="purpose" value="reservation">
                    <label for="reservation">Reservation Question</label><br>

                    <input type="radio" id="suggestion" name="purpose" value="suggestion">
                    <label for="suggestion">Website Suggestion</label>
                </div>

                <div class="form-item">
                    <label for="feedback">Message</label>
                    <textarea id="feedback" name="feedback" rows="4"
                      placeholder="Type Here"></textarea>
                </div>

                <div class="form-item">
                    <input type="checkbox" id="subscription" name="subscription">
                    <label for="subscription">Please subscribe me to the monthly newsletter</label>
                </div>

                <button type="submit">Get in Touch!</button>
            </form>
        </section>

        <section class="support">
            <h1 class="contact">We Are Here to Serve You</h1>
            <figure>
                <img src="images/employee1.webp" alt="River Guide photo" width="150">
                <figcaption>River Guide</figcaption>
            </figure>

            <figure>
                <img src="images/employee3.jpg" alt="Operations Manager photo" width="150">
                <figcaption>Operations Manager</figcaption>
            </figure>

            <figure>
                <img src="images/employee2.webp" alt="Safety Coordinator photo" width="150">
                <figcaption>Safety Coordinator</figcaption>
            </figure>

        </section>

    </main>
    <footer>
        <p>&copy;2026 💦 Rapids Whitewater Rafting 💦 Anna Bubyr</p>
        <nav class="socialmedia">
            <a href="https://www.facebook.com/">
                <img src="images/facebook.svg" alt="Facebook Icon" width="40">
            </a>
            <a href="https://www.instagram.com/?hl=en">
                <img src="images/instagram.svg" alt="Instagram Icon" width="40">
            </a>
            <a href="https://www.youtube.com/">
                <img src="images/youtube.svg" alt="Youtube Icon" width="40">
            </a>

        </nav>
    </footer>
</body>

</html>
